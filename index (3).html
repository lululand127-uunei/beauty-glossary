<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美妆日语词汇库</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap');

  :root {
    --bg: #FAF8F5;
    --surface: #FFFFFF;
    --border: #E8E4DF;
    --text: #1A1714;
    --muted: #7A7470;
    --hint: #B0AAA5;
    --accent: #C9727A;
    --tag-skin: #FDE8EF; --tag-skin-t: #8B3A4F;
    --tag-make: #EDE8FD; --tag-make-t: #4A3A8B;
    --tag-hair: #E4F4EC; --tag-hair-t: #2A6644;
    --tag-body: #FDF3E3; --tag-body-t: #7A4E1A;
    --tag-ingr: #E6F4E4; --tag-ingr-t: #2A5E28;
    --tag-other: #F0EEE8; --tag-other-t: #4A4640;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans SC', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem 1rem; position: sticky; top: 0; z-index: 50;
  }
  .header-inner { max-width: 960px; margin: 0 auto; }
  .logo-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
  .logo-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 22px; font-weight: 500; letter-spacing: 0.04em; color: var(--accent); }
  .logo-zh { font-size: 13px; color: var(--muted); }
  .search-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .search-row input, .search-row select {
    height: 38px; padding: 0 12px; font-size: 14px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font-family: inherit;
  }
  .search-row input { flex: 1; min-width: 180px; }
  .search-row input:focus, .search-row select:focus { outline: none; border-color: var(--accent); }
  .btn-add {
    height: 38px; padding: 0 18px; border-radius: 8px;
    background: var(--accent); color: #fff; border: none;
    font-size: 14px; font-family: inherit; cursor: pointer;
  }
  .btn-add:hover { opacity: 0.88; }

  main { max-width: 960px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
  .meta-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .count { font-size: 13px; color: var(--muted); }
  .sync-status { font-size: 12px; color: var(--hint); }
  .sync-status.ok { color: #2A6644; }
  .sync-status.err { color: #8B3A4F; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; position: relative;
    transition: border-color .15s, box-shadow .15s;
  }
  .card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(201,114,122,0.08); }
  .tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 99px; margin-bottom: 10px; }
  .tag-skin  { background: var(--tag-skin);  color: var(--tag-skin-t); }
  .tag-make  { background: var(--tag-make);  color: var(--tag-make-t); }
  .tag-hair  { background: var(--tag-hair);  color: var(--tag-hair-t); }
  .tag-body  { background: var(--tag-body);  color: var(--tag-body-t); }
  .tag-ingr  { background: var(--tag-ingr);  color: var(--tag-ingr-t); }
  .tag-other { background: var(--tag-other); color: var(--tag-other-t); }
  .word-jp   { font-family: 'Noto Sans JP', sans-serif; font-size: 20px; font-weight: 500; margin-bottom: 2px; }
  .word-kana { font-size: 12px; color: var(--muted); margin-bottom: 7px; }
  .word-zh   { font-size: 14px; color: var(--text); }
  .word-note { font-size: 12px; color: var(--muted); line-height: 1.55; border-top: 1px solid var(--border); margin-top: 10px; padding-top: 8px; }
  .card-del {
    position: absolute; top: 10px; right: 10px;
    background: none; border: none; color: var(--hint);
    cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 5px; border-radius: 5px;
  }
  .card-del:hover { color: #c0392b; background: #fdecea; }
  .empty { text-align: center; color: var(--hint); padding: 3rem 0; font-size: 14px; grid-column: 1/-1; }
  .loading { text-align: center; color: var(--hint); padding: 3rem 0; font-size: 14px; grid-column: 1/-1; }

  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(26,23,20,0.4); z-index: 200;
    align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px; border: 1px solid var(--border);
    padding: 1.75rem; width: 420px; max-width: 100%; max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { font-size: 17px; font-weight: 500; margin-bottom: 1.25rem; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 9px 12px; font-size: 14px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 68px; line-height: 1.55; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .btn-cancel {
    height: 38px; padding: 0 16px; border-radius: 8px;
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-size: 14px; font-family: inherit; cursor: pointer;
  }
  .btn-save {
    height: 38px; padding: 0 20px; border-radius: 8px;
    background: var(--accent); color: #fff; border: none;
    font-size: 14px; font-family: inherit; cursor: pointer;
  }
  .btn-save:hover { opacity: 0.88; }

  @media (max-width: 540px) {
    header { padding: 1rem; }
    main { padding: 1rem 1rem 3rem; }
    .grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-row">
      <span class="logo-jp">美容・コスメ用語集</span>
      <span class="logo-zh">美妆日语词汇库</span>
    </div>
    <div class="search-row">
      <input type="text" id="search" placeholder="搜索日文、中文或假名…" oninput="render()">
      <select id="filter" onchange="render()">
        <option value="">全部分类</option>
        <option value="skin">护肤</option>
        <option value="make">彩妆</option>
        <option value="hair">发品</option>
        <option value="body">身体护理</option>
        <option value="ingr">成分</option>
        <option value="other">其他</option>
      </select>
      <button class="btn-add" onclick="openModal()">＋ 添加词条</button>
    </div>
  </div>
</header>

<main>
  <div class="meta-row">
    <span class="count" id="count"></span>
    <span class="sync-status" id="syncStatus">正在加载…</span>
  </div>
  <div class="grid" id="grid"><div class="loading">正在加载词条…</div></div>
</main>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>添加新词条</h2>
    <div class="field"><label>日文（汉字）*</label><input id="f-jp" placeholder="例：美容液"></div>
    <div class="field"><label>读音（假名）</label><input id="f-kana" placeholder="例：びようえき"></div>
    <div class="field"><label>中文含义 *</label><input id="f-zh" placeholder="例：精华液"></div>
    <div class="field"><label>分类</label>
      <select id="f-cat">
        <option value="skin">护肤</option>
        <option value="make">彩妆</option>
        <option value="hair">发品</option>
        <option value="body">身体护理</option>
        <option value="ingr">成分</option>
        <option value="other">其他</option>
      </select>
    </div>
    <div class="field"><label>备注（用法、搭配等，可留空）</label><textarea id="f-note" placeholder="例：常出现在エッセンス，高端精华的表达"></textarea></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="addEntry()">保存</button>
    </div>
  </div>
</div>

<script>
const BIN_ID  = '6a33609cf5f4af5e29060203';
const API_KEY = '$2a$10$7eVy/CCrZpFF.Xx09XPkguGdLD0Xsg9pjxGqiqVXUQ2UfGH8jvfkS';

const BASE_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
const HEADERS  = {
  'Content-Type': 'application/json',
  'X-Access-Key': API_KEY,
  'X-Bin-Private': 'false'
};
const READ_HEADERS = {
  'X-Access-Key': API_KEY
};

const CAT_LABEL = { skin:'护肤', make:'彩妆', hair:'发品', body:'身体护理', ingr:'成分', other:'其他' };

const DEFAULT_DATA = [
  { id:1,  jp:'化粧水',          kana:'けしょうすい',      zh:'化妆水／爽肤水',   cat:'skin', note:'护肤第一步，有时也译作"柔肤水"' },
  { id:2,  jp:'美容液',          kana:'びようえき',        zh:'精华液',           cat:'skin', note:'核心护肤步骤，高浓度活性成分' },
  { id:3,  jp:'乳液',            kana:'にゅうえき',        zh:'乳液',             cat:'skin', note:'质地比クリーム轻薄' },
  { id:4,  jp:'日焼け止め',      kana:'ひやけどめ',        zh:'防晒霜',           cat:'skin', note:'含SPF/PA值标注' },
  { id:5,  jp:'毛穴',            kana:'けあな',            zh:'毛孔',             cat:'skin', note:'毛穴ケア＝毛孔护理' },
  { id:6,  jp:'くすみ',          kana:'くすみ',            zh:'暗沉／肤色暗黄',   cat:'skin', note:'くすみケア常见于美白产品' },
  { id:7,  jp:'ファンデーション', kana:'ふぁんでーしょん',  zh:'粉底',             cat:'make', note:'包括液体、粉饼等多种剂型' },
  { id:8,  jp:'口紅',            kana:'くちべに',          zh:'口红',             cat:'make', note:'与リップスティック同义，前者更传统' },
  { id:9,  jp:'アイライナー',    kana:'あいらいなー',      zh:'眼线笔／眼线液',   cat:'make', note:'' },
  { id:10, jp:'シャンプー',      kana:'しゃんぷー',        zh:'洗发水',           cat:'hair', note:'' },
  { id:11, jp:'ヒアルロン酸',    kana:'ひあるろんさん',    zh:'透明质酸／玻尿酸', cat:'ingr', note:'保湿核心成分' },
  { id:12, jp:'レチノール',      kana:'れちのーる',        zh:'视黄醇／维甲醇',   cat:'ingr', note:'抗老成分，敏感肌需注意浓度' },
];

let data = [];
let nextId = 13;

function setStatus(msg, type) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.className = 'sync-status' + (type ? ' ' + type : '');
}

async function loadData() {
  try {
    setStatus('正在同步…');
    const res = await fetch(BASE_URL + '/latest', { headers: READ_HEADERS });
    if (!res.ok) throw new Error('fetch failed: ' + res.status);
    const json = await res.json();
    data = json.record.entries || DEFAULT_DATA;
    nextId = json.record.nextId || (Math.max(...data.map(d=>d.id), 0) + 1);
    setStatus('已同步 ✓', 'ok');
  } catch(e) {
    console.error(e);
    data = DEFAULT_DATA;
    setStatus('同步失败，显示默认词条', 'err');
  }
  render();
}

async function saveData() {
  try {
    setStatus('正在保存…');
    const res = await fetch(BASE_URL, {
      method: 'PUT',
      headers: HEADERS,
      body: JSON.stringify({ entries: data, nextId })
    });
    if (!res.ok) throw new Error('save failed: ' + res.status);
    setStatus('已保存 ✓', 'ok');
  } catch(e) {
    console.error(e);
    setStatus('保存失败，请刷新重试', 'err');
  }
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const f = document.getElementById('filter').value;
  const list = data.filter(d => {
    const match = !q || d.jp.includes(q) || d.kana.includes(q) || d.zh.includes(q) || (d.note||'').includes(q);
    return match && (!f || d.cat === f);
  });
  document.getElementById('count').textContent = '共 ' + list.length + ' 个词条';
  const g = document.getElementById('grid');
  if (!list.length) { g.innerHTML = '<div class="empty">没有找到匹配词条</div>'; return; }
  g.innerHTML = list.map(d => `
    <div class="card">
      <button class="card-del" onclick="del(${d.id})" title="删除">×</button>
      <span class="tag tag-${d.cat}">${CAT_LABEL[d.cat]}</span>
      <div class="word-jp">${d.jp}</div>
      <div class="word-kana">${d.kana || '—'}</div>
      <div class="word-zh">${d.zh}</div>
      ${d.note ? `<div class="word-note">${d.note}</div>` : ''}
    </div>
  `).join('');
}

async function del(id) {
  if (!confirm('确定删除这个词条吗？')) return;
  data = data.filter(d => d.id !== id);
  render(); await saveData();
}

function openModal() { document.getElementById('modalBg').classList.add('open'); document.getElementById('f-jp').focus(); }
function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  ['f-jp','f-kana','f-zh','f-note'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-cat').value = 'skin';
}

async function addEntry() {
  const jp = document.getElementById('f-jp').value.trim();
  const zh = document.getElementById('f-zh').value.trim();
  if (!jp || !zh) { alert('日文和中文含义为必填项'); return; }
  data.unshift({ id: nextId++, jp, zh,
    kana: document.getElementById('f-kana').value.trim(),
    cat:  document.getElementById('f-cat').value,
    note: document.getElementById('f-note').value.trim(),
  });
  closeModal(); render(); await saveData();
}

document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeModal();
});

loadData();
</script>
</body>
</html>
